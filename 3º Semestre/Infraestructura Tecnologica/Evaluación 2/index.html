<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Instituto Tecnológico Concepción</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #003366;
            color: white;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: left;
            gap: 20px;
        }
        h1 {
            margin: 0;
            font-size: 28px;
        }
        .container {
            padding: 30px;
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 8px;
            border: 1px solid #ccc; 
        }
        ul {
            list-style-type: square;
            text-align: left;
            display: inline-block;
        }
        li {
            padding: 5px 0;
            font-size: 16px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <img src="./logo.png" height="90" width="90" alt="Logo Instituto Tecnológico Concepción">
        <h1>Instituto Tecnológico Concepción</h1>
    </header>

    <div class="container">
        <h2>Bienvenido al Portal</h2>
        <hr>
        <h3>Nuestras Áreas de Capacitación:</h3>
        <ul>
            <li>Área de Informática y Telecomunicaciones</li>
            <li>Área de Redes y Ciberseguridad</li>
            <li>Área de Infraestructura Tecnológica</li>
        </ul>
        
        <div class="footer">
            <p>Servidor Web Central &copy; 2026</p>
        </div>
    </div>

</body>
</html>
